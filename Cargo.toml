[package]
name = "poe_data_tools"
version = "1.7.2"
edition = "2024"
default-run = "poe_data_tools"

[lib]
name = "poe_data_tools"
path = "src/lib.rs"

[[bin]]
name = "poe_data_tools"
path = "src/bin/poe_data_tools.rs"

[dependencies]
anyhow = "1.0.100"
murmurhash64 = "0.3.1"
oozextract = "0.5.0"

clap = { version = "4.5.53", features = ["derive", "string", "help"] }
reqwest = { version = "0.12.25", features = ["blocking"] }
url = "2.5.7"
dirs = "6.0.0"
bytes = "1.11.0"
glob = "0.3.3"
serde = {version = "1.0.228", features = ["derive"]}
serde_with = "3.18.0"
serde_json = { version = "1.0.145", features = ["preserve_order"] }
rayon = "1.11.0"
image = { git = "https://github.com/RunDevelopment/image", branch = "new-dds-decoder" }
iterators_extended = "0.2.0"
itertools = "0.14.0"
regex = "1.12.3"
enum_dispatch = "0.3.13"
log = "0.4.29"
env_logger = "0.11.10"
tokio = { version = "1.51.1", features = ["fs", "rt"]}
futures = "0.3.32"

# Arrow - for dataframe stuff
arrow-csv = "56.2.0"
arrow-array = "56.2.0"
arrow-cast = "56.2.0"
arrow-schema = "56.2.0"

# Forked version of winnow with better debugging capabilities
winnow = { git = "https://github.com/adamthedash/winnow.git" }

annotated_parser = { git = "https://github.com/adamthedash/annotated_parser.git", features = ["f16"] }
# annotated_parser = { path = "../annotated_parser", features = ["f16"] }

[features]
default = []
debug = ["winnow/debug"]

[dev-dependencies]
criterion = { version = "0.3", features = ["html_reports"] }

[[bench]]
name = "fs"
harness = false

[[bench]]
name = "coverage"
harness = false

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[profile.release]
incremental = true
